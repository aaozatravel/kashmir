<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels - Aaoza Travel</title>

<style>
/* ===== PAGE ===== */
body{
  margin:0;
  background:black;
  font-family:Arial;
  overflow:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 15px;
  z-index:10;
}

header img{
  width:35px;
  border-radius:50%;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:60px;
  left:10px;
  z-index:10;
  background:red;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
}

/* ===== REELS ===== */
.reels-page{
  height:100vh;
}

.reels-scroll{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scrollbar-width:none;
}

.reels-scroll::-webkit-scrollbar{
  display:none;
}

/* REEL CARD */
.reel{
  height:100vh;
  width:100%;
  scroll-snap-align:start;
  position:relative;
  background:black;
}

/* VIDEO */
.reel iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.jpg">
<b>Aaoza Reels</b>
</div>
</header>

<button class="back-btn" onclick="history.back()">← Back</button>

<section class="reels-page">

  <div class="reels-scroll">

    <div class="reel">
      <iframe src="https://www.youtube.com/embed/MNkj0Z4wB5M?enablejsapi=1&mute=1"></iframe>
    </div>

    <div class="reel">
      <iframe src="https://www.youtube.com/embed/bY1xEfsZEow?enablejsapi=1&mute=1"></iframe>
    </div>

    <div class="reel">
      <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY?enablejsapi=1&mute=1"></iframe>
    </div>

  </div>

</section>

<script>
const reels = document.querySelectorAll(".reel iframe");
const container = document.querySelector(".reels-scroll");

function pauseAll(){
  reels.forEach(v=>{
    v.contentWindow.postMessage(
      '{"event":"command","func":"pauseVideo","args":""}',
      "*"
    );
  });
}

function muteAll(){
  reels.forEach(v=>{
    v.contentWindow.postMessage(
      '{"event":"command","func":"mute","args":""}',
      "*"
    );
  });
}

function playActive(index){
  pauseAll();
  muteAll();

  reels[index].contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}',
    "*"
  );

  // UNMUTE ACTIVE REEL
  setTimeout(()=>{
    reels[index].contentWindow.postMessage(
      '{"event":"command","func":"unMute","args":""}',
      "*"
    );
  }, 600);
}

container.addEventListener("scroll", ()=>{
  const index = Math.round(container.scrollTop / window.innerHeight);
  playActive(index);
});

// auto play first reel
window.onload = ()=>{
  playActive(0);
};
</script>

</body>
</html>
