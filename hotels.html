<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotels - Aaoza Travel</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#0a0a0a,#111);
  color:white;
}

/* 🔥 HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#000;
  border-bottom:1px solid rgba(255,0,0,0.3);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:40px;
  border-radius:10px;
}

/* 🔍 SEARCH */
.search-box{
  padding:10px;
}

.search-box input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#1a1a1a;
  color:white;
}

/* 🔥 SLIDER */
.slider{
  overflow:hidden;
  margin:10px;
  border-radius:15px;
}

.slides{
  display:flex;
  transition:0.6s;
}

.slide{
  min-width:100%;
  position:relative;
}

.slide img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.slide h2{
  position:absolute;
  bottom:15px;
  left:15px;
  background:rgba(0,0,0,0.7);
  padding:8px 14px;
  border-radius:10px;
}

/* 🔥 HOTEL */
.container{
  padding:10px;
}

.card{
  background:#111;
  border-radius:15px;
  margin-bottom:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(255,0,0,0.2);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.card h3{
  margin:5px 0;
}

.card p{
  color:#ccc;
  font-size:13px;
}

/* 🔘 BUTTON */
.btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  background:red;
  color:white;
  border-radius:10px;
}

/* 🌐 SOCIAL ICONS */
.social{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.icon{
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,0.2);
}

/* FLOAT BUTTON */
.floating{
  position:fixed;
  bottom:15px;
  right:15px;
}

.floating a{
  display:flex;
  align-items:center;
  justify-content:center;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#25D366;
}
</style>
</head>

<body>

<script>

// 🔥 SLIDER
let i=0;
setInterval(()=>{
  i++;
  if(i>=2) i=0;
  document.getElementById("slides").style.transform=`translateX(-${i*100}%)`
},3000);

// 🔍 SEARCH FUNCTION
document.getElementById("search").addEventListener("keyup",function(){
  let value = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    let name = card.dataset.name;
    card.style.display = name.includes(value) ? "block" : "none";
  });
});

</script>

</html>
