<style>

/* 🌌 BODY */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b0b0b; /* 🔥 dark premium */
  color:white;
  overflow-x:hidden;
}

/* ✨ ANIMATED GLOW LINES */
body::after{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  
  background:repeating-linear-gradient(
  120deg,
  rgba(0, 170, 255, 0.12) 0px,
  rgba(0, 170, 255, 0.12) 2px,
  transparent 2px,
  transparent 35px
);

  animation:moveLines 8s linear infinite;
  z-index:0;
  pointer-events:none;
}

/* 🌟 EXTRA GLOW EFFECT */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
  z-index:0;
}

/* 🔄 ANIMATION */
@keyframes moveLines{
  0%{transform:translate(0,0);}
  100%{transform:translate(150px,150px);}
}

/* 🌊 WATERMARK */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:280px;
  height:280px;
  background:url('watermark.png') no-repeat center;
  background-size:contain;
  opacity:0.04;
  z-index:0;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:12px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  position:relative;
  z-index:2;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:40px;
  border-radius:10px;
}

/* SEARCH */
.search-box{
  padding:10px;
  position:relative;
  z-index:2;
}

.search-box input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

/* SLIDER */
.slider{
  overflow:hidden;
  margin:10px;
  border-radius:15px;
  position:relative;
  z-index:2;
}

.slides{
  display:flex;
  transition:0.6s;
}

.slide{
  min-width:100%;
  position:relative;
}

.slide img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.slide h2{
  position:absolute;
  bottom:15px;
  left:15px;
  background:rgba(0,0,0,0.6);
  padding:8px 14px;
  border-radius:10px;
}

/* HOTEL CARD */
.container{
  padding:10px;
  position:relative;
  z-index:2;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:15px;
  margin-bottom:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.card p{
  color:#ccc;
}

/* CALL BUTTONS */
.call-buttons{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.call-btn{
  flex:1;
  padding:8px;
  font-size:12px;
  border:none;
  background:#008cff;
  color:white;
  border-radius:8px;
}

/* VIEW BUTTON */
.btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  background:#ff3b3b;
  color:white;
  border-radius:10px;
}
.back-btn{
  position: fixed;
  top: 90px;   /* ⬅️ yahan adjust kiya (logo ke neeche) */
  left: 12px;
  width: 40px;
  height: 40px;

  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.4);

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  color: #fff;
  font-size: 18px;
  font-weight: 600;

  display: flex;
  align-items: center;
  justify-content: center;

  z-index: 9999;
  cursor: pointer;

  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  transition: all 0.2s ease;
}


</style>
</head>

<script>

// SLIDER
let i=0;
setInterval(()=>{
  i++;
  if(i>=2) i=0;
  document.getElementById("slides").style.transform=`translateX(-${i*100}%)`
},3000);

// SEARCH
document.getElementById("search").addEventListener("keyup",function(){
  let value = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    let name = card.dataset.name;
    card.style.display = name.includes(value) ? "block" : "none";
  });
});

</script>
