<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking</title>

<link rel="stylesheet" href="booking.css">

</head>

<body>
  <!-- 🔔 TOP ALERT -->
<div id="topAlert" class="top-alert"></div>

<button onclick="history.back()">← Back</button>

<h1>Complete Your Booking</h1>

<!-- 🧑 TRAVELLERS -->
<h2>Travellers</h2>

<div class="row">
<span>Adults (12+)</span>
<div>
<button onclick="changeCount('adult',-1)">-</button>
<span id="adultCount">1</span>
<button onclick="changeCount('adult',1)">+</button>
</div>
</div>

<div class="row">
<span>Children (5-11)</span>
<div>
<button onclick="changeCount('child',-1)">-</button>
<span id="childCount">0</span>
<button onclick="changeCount('child',1)">+</button>
</div>
</div>

<div class="row">
<span>Infants (Free)</span>
<div>
<button onclick="changeCount('infant',-1)">-</button>
<span id="infantCount">0</span>
<button onclick="changeCount('infant',1)">+</button>
</div>
</div>

<!-- 👤 DETAILS -->
<h2>Traveller Details</h2>

<div id="travellerRows"></div>

<h2>Rooms</h2>

<p style="color:gray;font-size:13px">
*Note: These prices are for 4 Nights stay
</p>

<div id="roomsContainer"></div>




<h2>Apply Coupon</h2>

<div class="coupon-box">
  <input type="text" id="couponInput" placeholder="Enter coupon code">
  <button onclick="applyCoupon()">Apply</button>
</div>

<!-- 💰 TOTAL -->
<h2 id="totalBox">Total ₹0</h2>

<button onclick="saveBooking()">Confirm Booking</button>
<!-- 🔊 SUCCESS SOUND -->
<audio id="couponSound" src="coupon.mp3" preload="auto"></audio>
<audio id="successSound" src="sucess.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
  
  let roomPrices = {}

async function loadRoomPrices(){

  const { data, error } = await supabaseClient
    .from("rooms")
    .select("*")

  if(error){
    console.log("Room fetch error:", error)
    return
  }

  let container = document.getElementById("roomsContainer")
  container.innerHTML = ""

  data.forEach((room, index)=>{

    roomPrices[room.room_type] = room
    selectedRooms[room.room_type] = false

    container.innerHTML += `

    <div class="row">
      <span>
        ${room.room_type.toUpperCase()} • ${room.nights} Nights ₹${room.price}
      </span>

      <div>

        <!-- BUTTON -->
        <button class="room-btn" onclick="toggleRoom('${room.room_type}')">
          <span class="tick" id="${room.room_type}Tick"></span>
        </button>

        <!-- VIEW DETAILS -->
        <a href="viewdetail${index+1}.html" class="view-btn">
          View Details
        </a>

      </div>
    </div>

    <div class="row">
      <span>Extra Room ₹${room.extra_price}</span>
      <div>
        <button onclick="changeExtra('${room.room_type}',-1)">-</button>
        <span id="${room.room_type}Extra">0</span>
        <button onclick="changeExtra('${room.room_type}',1)">+</button>
      </div>
    </div>

    <hr>
    `
  })
}
  
  
  let discountAmount = 0
let couponApplied = false
let appliedCoupon = null
async function applyCoupon(){

// ❌ already applied
if(couponApplied){
showAlert("Coupon already used ❌","error")
return
}

let code = document.getElementById("couponInput").value.trim()

if(!code){
showAlert("Enter coupon code ❗","error")
return
}

// 🔥 supabase se fetch
const { data, error } = await supabaseClient
.from("coupons")
.select("*")
.eq("code", code)
.single()
console.log("COUPON DATA:", data)

if(error || !data){
showAlert("Invalid coupon ❌","error")
return
}

// 🔥 PACKAGE CHECK
let packageName = localStorage.getItem("selectedPackage")

// ✅ SAME NORMALIZATION (VERY IMPORTANT)
if(packageName === "Local Tour") packageName = "Local"
if(packageName === "Pro Tour") packageName = "Pro"
if(packageName === "Premium Pro+") packageName = "Premium"

console.log("PACKAGE:", packageName)
console.log("COUPON PACKAGE:", data.package)

if(data.package !== packageName){
showAlert("Ye coupon is package ke liye nahi hai ❌","error")
return
}

// 🔥 discount nikalna

// total calculate karo
let price = parseInt(localStorage.getItem("selectedPrice") || 0)

let adults = +adultCount.innerText
let child = +childCount.innerText

let paying = adults + child

let packageTotal = price * paying

let total = packageTotal

Object.keys(selectedRooms).forEach(type=>{
  if(selectedRooms[type] && roomPrices[type]){
    total += roomPrices[type].price
    total += (+document.getElementById(type+"Extra").innerText) * roomPrices[type].extra_price
  }
})

let fixedDiscount = parseInt(data.discount_amount || data.discount || 0)

if(fixedDiscount <= 0){
  showAlert("Coupon invalid amount ❌","error")
  return
}

discountAmount = fixedDiscount

// ✅ lock kar do
couponApplied = true
appliedCoupon = data

showAlert(`Coupon ₹${fixedDiscount} Applied 🎉`,"success")
let couponSound = document.getElementById("couponSound")
if(couponSound){
  couponSound.currentTime = 0
  couponSound.play().catch(err=>{
    console.log("Coupon sound blocked:", err)
  })
}

calculateTotal()
}
  

// 🔔 ALERT FUNCTION (TOP SLIDE)
function showAlert(msg,type="success"){
if (navigator.vibrate) {
  if (type === "success") {
    navigator.vibrate([80, 40, 80])
  } else {
    navigator.vibrate(500)
  }
}


const alertBox = document.getElementById("topAlert")

alertBox.className = "top-alert show " + type

// 🔥 ICON CHANGE
let icon = ""

if(type === "success"){
icon = `
<svg viewBox="0 0 24 24">
<path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34z" fill="#22c55e"/>
<path d="M9.5 14.58l-2.79-2.79-1.21 1.21 4 4 8-8-1.21-1.21z" fill="#ffffff"/>
</svg>`
}else{
icon = `
<svg viewBox="0 0 24 24">
<path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34z" fill="#ef4444"/>
<path d="M8 8l8 8M16 8l-8 8" stroke="#fff" stroke-width="2"/>
</svg>`
}

alertBox.innerHTML = `
<div class="alert-content">
${icon}
<span>${msg}</span>
</div>
`

setTimeout(()=>{
alertBox.classList.remove("show")
},2500)
}

// 🔢 COUNTER
function changeCount(type,val){
let id = type+"Count"
let el = document.getElementById(id)

let num = parseInt(el.innerText)
num += val
if(num < 0) num = 0

if(type==="adult" && num < 1) num = 1

el.innerText = num

updateTravellers()
calculateTotal()
}

// 👤 TRAVELLERS
function updateTravellers(){

let adult = +adultCount.innerText
let child = +childCount.innerText
let infant = +infantCount.innerText

let total = adult + child + infant

let html = ""

for(let i=0;i<total;i++){

let isInfant = i >= (adult + child)

html += `
<div class="traveller">
<input placeholder="Name">

<select>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="number" placeholder="Age" value="${isInfant?1:''}" ${isInfant?"readonly":""}>

<input 
  type="tel" 
  inputmode="numeric" 
  pattern="[0-9]{10}" 
  placeholder="${isInfant?'Not required':'Phone'}" 
  ${isInfant?"disabled":""}
>

</div>
`
}

document.getElementById("travellerRows").innerHTML = html
}

// 🏨 ROOMS
function changeRoom(type,val){
let id = type+"Room"
let el = document.getElementById(id)

let num = +el.innerText
num += val
if(num < 0) num = 0

el.innerText = num

calculateTotal()
}

// 💰 TOTAL
function calculateTotal(){

let price = parseInt(localStorage.getItem("selectedPrice") || 0)

let adults = +adultCount.innerText
let child = +childCount.innerText

let paying = adults + child

let packageTotal = price * paying

let total = packageTotal

// DELUXE
Object.keys(selectedRooms).forEach(type=>{
  if(selectedRooms[type] && roomPrices[type]){
    total += roomPrices[type].price
    total += (+document.getElementById(type+"Extra").innerText) * roomPrices[type].extra_price
  }
})

let finalTotal = total - discountAmount
if(finalTotal < 0) finalTotal = 0

document.getElementById("totalBox").innerText = "Total ₹" + finalTotal
}

// 💾 SAVE BOOKING
async function saveBooking(){

const { data:{user} } = await supabaseClient.auth.getUser()

if(!user){
showAlert("Login required 🔒","error")
return
}

let travellers = []

document.querySelectorAll(".traveller").forEach(row=>{
let inputs = row.querySelectorAll("input,select")

travellers.push({
name: inputs[0].value,
gender: inputs[1].value,
age: inputs[2].value,
phone: inputs[3].value
})
})

let adults = +adultCount.innerText
let child = +childCount.innerText
let infant = +infantCount.innerText

let packageName = localStorage.getItem("selectedPackage")

// ✅ normalize same as saveBooking
if(packageName === "Local Tour") packageName = "Local"
if(packageName === "Pro Tour") packageName = "Pro"
if(packageName === "Premium Pro+") packageName = "Premium"
let packagePrice = parseInt(localStorage.getItem("selectedPrice")) || 0

let packageDetails = {}

if(packageName === "Local"){
  packageDetails = {
    places: ["Gulmarg","Sonmarg","Srinagar","Dal Lake","Nishat","Shalimar","Doodhpathri"],
    activities: ["Gondola Phase 1","Horse Ride 1hr"],
    services: ["Cab","Driver","Guide"],
    media: ["Photography","Reels (10)"]
  }
}

if(packageName === "Pro"){
  packageDetails = {
    places: ["Gulmarg","Sonmarg","Doodhpathri","Srinagar","Dal Lake","Gardens","Drang Waterfall"],
    activities: ["Gondola Phase 1 & 2","Horse Ride 2hr"],
    services: ["Cab","Driver","Guide"],
    media: ["Photoshoot","Video","Reels (15)"]
  }
}

if(packageName === "Premium"){
  packageDetails = {
    places: ["All Places","Waterfalls","Hidden Spots"],
    activities: ["Gondola 1,2,3","Skiing","Cycling","Full Day Horse Ride"],
    services: ["Cab","Driver","Guide"],
    media: ["Unlimited Photos","Unlimited Reels"]
  }
}


let paying = adults + child
let packageTotal = packagePrice * paying

let total = packageTotal

Object.keys(selectedRooms).forEach(type=>{
  if(selectedRooms[type] && roomPrices[type]){
    total += roomPrices[type].price
    total += (+document.getElementById(type+"Extra").innerText) * roomPrices[type].extra_price
  }
})
let finalTotal = total - discountAmount
if(finalTotal < 0) finalTotal = 0

// room check
// room check (FIXED)
let anyRoomSelected = Object.values(selectedRooms).some(v => v === true)

if(!anyRoomSelected){
  showAlert("Please select at least 1 room 🏨","error")
  return
}

  

// traveller check
// EMPTY travellers remove karo
travellers = travellers.filter(t => t.name && t.name.trim() !== "")

// check at least 1 traveller
if(travellers.length === 0){
  showAlert("Enter at least 1 traveller ❗","error")
  return
}

// validation
for(let t of travellers){

  if(!t.gender){
    showAlert("Select gender ❗","error")
    return
  }

  if(!t.age || t.age <= 0){
    showAlert("Enter valid age ❗","error")
    return
  }

  if(t.age > 2){
    if(!t.phone || t.phone.trim() === ""){
      showAlert("Phone number required 📱","error")
      return
    }
  }

}



// ❌ VALIDATION END


const { error } = await supabaseClient
.from("bookings")
.insert([{
user_email:user.email,
package_name:packageName,
package_price:packagePrice,

// ✅ FIXED STRUCTURE
traveller_details: JSON.stringify({
  travellers: travellers,
  package_details: packageDetails,
  rooms: Object.keys(selectedRooms).map(type => ({
  type: type,
  selected: selectedRooms[type],

  // 🔥 SAVE PRICE SNAPSHOT
  price: roomPrices[type]?.price || 0,
  extra_price: roomPrices[type]?.extra_price || 0,

  extra: +(document.getElementById(type+"Extra")?.innerText || 0)
}))
}),

adults,
children:child,
infants:infant,
total_price: finalTotal,
original_price: total,
coupon_discount: discountAmount,
coupon_code: document.getElementById("couponInput")?.value || null,
coupon_percent: appliedCoupon ? appliedCoupon.discount : null,
status:"pending"
}])

if(error){
  console.log("❌ SUPABASE ERROR:", error) // 👈 IMPORTANT
  showAlert("Booking failed ❌","error")
  return
}

// 🔊 SUCCESS SOUND PLAY
let successSound = document.getElementById("successSound")

if(successSound){
  successSound.currentTime = 0
  successSound.play().catch(err=>{
    console.log("Sound blocked:", err)
  })
}

showAlert("Booking Sent Successfully 🎉","success")

setTimeout(()=>{
window.location.href="my-booking.html"
},2000)

}
let selectedRooms = {
  deluxe:false,
  standard:false
}

// ✔ ROOM SELECT (tick/cross)
function toggleRoom(type){

  selectedRooms[type] = !selectedRooms[type]

  let tick = document.getElementById(type+"Tick")

  if(selectedRooms[type]){
    tick.classList.add("active")
  }else{
    tick.classList.remove("active")
    document.getElementById(type+"Extra").innerText = 0
  }

  showAlert(type + (selectedRooms[type] ? " selected ✅" : " removed ❌"))

  calculateTotal()
}

// ➕ EXTRA ROOM
function changeExtra(type,val){

  if(!selectedRooms[type]){
    showAlert("Select main room first ❗","error")
    return
  }

  let id = type+"Extra"
  let el = document.getElementById(id)

  let num = +el.innerText
  num += val

  if(num < 0) num = 0

  el.innerText = num

  calculateTotal()
}

// INIT
updateTravellers()
calculateTotal()
loadRoomPrices()
</script>


</body>
</html>
