<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking</title>

<link rel="stylesheet" href="booking.css">

</head>

<body>

<button onclick="history.back()">← Back</button>

<h1>Complete Your Booking</h1>

<!-- 🧑 TRAVELLERS -->
<h2>Travellers</h2>

<div class="row">
<span>Adults (12+)</span>
<div>
<button onclick="changeCount('adult',-1)">-</button>
<span id="adultCount">1</span>
<button onclick="changeCount('adult',1)">+</button>
</div>
</div>

<div class="row">
<span>Children (5-11)</span>
<div>
<button onclick="changeCount('child',-1)">-</button>
<span id="childCount">0</span>
<button onclick="changeCount('child',1)">+</button>
</div>
</div>

<div class="row">
<span>Infants (Free)</span>
<div>
<button onclick="changeCount('infant',-1)">-</button>
<span id="infantCount">0</span>
<button onclick="changeCount('infant',1)">+</button>
</div>
</div>

<!-- 👤 DETAILS -->
<h2>Traveller Details</h2>

<div id="travellerRows"></div>

<!-- 🏨 ROOMS -->
<h2>Rooms</h2>

<div class="row">
<span>Single Room ₹6999</span>
<div>
<button onclick="changeRoom('single',-1)">-</button>
<span id="singleRoom">0</span>
<button onclick="changeRoom('single',1)">+</button>
</div>
</div>

<div class="row">
<span>Double Room ₹8999</span>
<div>
<button onclick="changeRoom('double',-1)">-</button>
<span id="doubleRoom">0</span>
<button onclick="changeRoom('double',1)">+</button>
</div>
</div>

<!-- 💰 TOTAL -->
<h2 id="totalBox">Total ₹0</h2>

<button onclick="saveBooking()">Confirm Booking</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

// 🔢 COUNTER
function changeCount(type,val){
let id = type+"Count"
let el = document.getElementById(id)

let num = parseInt(el.innerText)
num += val
if(num < 0) num = 0

// minimum 1 adult
if(type==="adult" && num < 1) num = 1

el.innerText = num

updateTravellers()
calculateTotal()
}

// 👤 TRAVELLER INPUTS
function updateTravellers(){

let adult = +adultCount.innerText
let child = +childCount.innerText
let infant = +infantCount.innerText

let total = adult + child + infant

let html = ""

for(let i=0;i<total;i++){

let isInfant = i >= (adult + child)

html += `
<div class="traveller">
<input placeholder="Name">
<select>
<option>Male</option>
<option>Female</option>
</select>
<input type="number" placeholder="Age" value="${isInfant?1:''}" ${isInfant?"readonly":""}>
<input placeholder="${isInfant?'Not required':'Phone'}" ${isInfant?"disabled":""}>
</div>
`
}

document.getElementById("travellerRows").innerHTML = html
}

// 🏨 ROOMS
function changeRoom(type,val){
let id = type+"Room"
let el = document.getElementById(id)

let num = +el.innerText
num += val
if(num < 0) num = 0

el.innerText = num

calculateTotal()
}

// 💰 TOTAL
function calculateTotal(){

let price = parseInt(localStorage.getItem("selectedPrice") || 0)

let adults = +adultCount.innerText
let child = +childCount.innerText

let paying = adults + child

let packageTotal = price * paying

let single = 6999 * (+singleRoom.innerText)
let double = 8999 * (+doubleRoom.innerText)

let total = packageTotal + single + double

document.getElementById("totalBox").innerText = "Total ₹" + total
}

// 💾 SAVE
async function saveBooking(){

const { data:{user} } = await supabaseClient.auth.getUser()

if(!user){
alert("Login first")
return
}

let travellers = []

document.querySelectorAll(".traveller").forEach(row=>{
let inputs = row.querySelectorAll("input,select")

travellers.push({
name: inputs[0].value,
gender: inputs[1].value,
age: inputs[2].value,
phone: inputs[3].value
})
})

let adults = +adultCount.innerText
let child = +childCount.innerText
let infant = +infantCount.innerText

let packageName = localStorage.getItem("selectedPackage")
let packagePrice = parseInt(localStorage.getItem("selectedPrice"))

// 📦 PACKAGE DETAILS ADD (IMPORTANT)

let packageDetails = {}

if(packageName === "Local"){
  packageDetails = {
    places: ["Gulmarg","Sonmarg","Srinagar","Dal Lake","Nishat","Shalimar","Doodhpathri"],
    activities: ["Gondola Phase 1","Horse Ride 1hr"],
    services: ["Cab","Driver","Guide"],
    media: ["Photography","Reels (10)"]
  }
}

if(packageName === "Pro"){
  packageDetails = {
    places: ["Gulmarg","Sonmarg","Doodhpathri","Srinagar","Dal Lake","Gardens","Drang Waterfall"],
    activities: ["Gondola Phase 1 & 2","Horse Ride 2hr"],
    services: ["Cab","Driver","Guide"],
    media: ["Photoshoot","Video","Reels (15)"]
  }
}

if(packageName === "Premium"){
  packageDetails = {
    places: ["All Places","Waterfalls","Hidden Spots"],
    activities: ["Gondola 1,2,3","Skiing","Cycling","Full Day Horse Ride"],
    services: ["Cab","Driver","Guide"],
    media: ["Unlimited Photos","Unlimited Reels"]
  }
}

let paying = adults + child

let packageTotal = packagePrice * paying

let singleRoomCount = +singleRoom.innerText
let doubleRoomCount = +doubleRoom.innerText

let singleTotal = 6999 * singleRoomCount
let doubleTotal = 8999 * doubleRoomCount

let total = packageTotal + singleTotal + doubleTotal

const bookingData = {
  travellers,

  package_name: packageName,
  package_price: packagePrice,

  // 🔥 ADD THIS
  package_details: packageDetails,

  adults,
  children: child,
  infants: infant,

  single_room: singleRoomCount,
  double_room: doubleRoomCount,

  total
}

const { error } = await supabaseClient
.from("bookings")
.insert([{
user_email:user.email,
package_name:packageName,
package_price:packagePrice,
traveller_details:JSON.stringify(bookingData),
adults,
children:child,
infants:infant,
single_room:singleRoomCount,
double_room:doubleRoomCount,
total_price:total,
status:"pending"
}])

if(error){
alert("Error saving booking")
return
}

alert("Booking Successful ✅")
window.location.href="my-booking.html"
}

// INIT
updateTravellers()
calculateTotal()

</script>


</body>
</html>
