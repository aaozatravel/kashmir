<body>

<div class="topbar">
<img src="logo.jpg">
<span>Aaoza Travels Kashmir</span>
</div>

<section class="section">

<div class="title">Meet Our Professional Guides</div>
<div class="subtitle">Certified local experts for your perfect Kashmir trip</div>

<div class="grid" id="guideGrid"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

loadGuides()

async function loadGuides(){

const { data } = await supabaseClient
.from("guides")
.select("*")

data.sort((a, b) => {

function getRank(g){
    if(g.type === "Senior Guide") return 1
    if(g.verified) return 2
    return 3
}

let diff = getRank(a) - getRank(b)

if(diff === 0){
    return (b.likes || 0) - (a.likes || 0)
}

return diff

})

let html=""

data.forEach(g=>{

let rating = parseFloat(g.rating || 0).toFixed(1)
let likes = g.likes || 0
let premium = likes >= 100 ? "premium-card" : ""

// ⭐ AUTO ROLE SYSTEM
let role = g.type

if (g.type === "Senior Guide") {
    role = "Senior Guide"
} 
else if (g.type === "Local Guide" && g.verified) {
    role = "Aaoza Guide"
}

let tick = likes >= 50 ? `
<span class="tick">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34z" fill="#1DA1F2"/>
        <path d="M9.5 14.58l-2.79-2.79-1.21 1.21 4 4 8-8-1.21-1.21z" fill="#ffffff"/>
    </svg>
</span>` : "";

let verified = likes >= 50 ? `<div class="badge">Verified Guide</div>` : ""
let premiumBadge = likes >= 100 ? `<div class="badge">Premium Guide</div>` : ""
html += `
<div class="card ${premium}">
    <div class="card-topbar">
        <img src="logo.jpg">
        <span>Aaoza Travels</span>
    </div>

<img src="${g.photo || 'https://via.placeholder.com/150'}" class="avatar">

<div class="name">${g.name} ${tick}</div>

<div class="role">${role}</div>

<div class="exp">${g.experience || '5+ Years Experience'}</div>

<div class="rating-number">⭐ ${rating}</div>

<div class="stars" data-id="${g.id}">
<span class="star" onclick="rate('${g.id}',1)">★</span>
<span class="star" onclick="rate('${g.id}',2)">★</span>
<span class="star" onclick="rate('${g.id}',3)">★</span>
<span class="star" onclick="rate('${g.id}',4)">★</span>
<span class="star" onclick="rate('${g.id}',5)">★</span>
</div>

<div class="like-box" onclick="likeGuide('${g.id}', this)">
<span class="heart">🤍</span>
<span id="like-${g.id}">${likes}</span> Likes
</div>

${verified}
${premiumBadge}
<button class="share-btn" onclick="shareGuide('${g.name}', '${g.photo || ''}')">
<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
<path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a2.5 2.5 0 000-1.39l7-4.11A2.5 2.5 0 0018 7.91a2.5 2.5 0 10-2.5-2.5c0 .23.03.45.09.66l-7 4.11a2.5 2.5 0 100 3.64l7.05 4.14c-.05.19-.08.39-.08.6a2.5 2.5 0 102.5-2.5z"/>
</svg>
</button>
</div>
`

})

document.getElementById("guideGrid").innerHTML=html

}

// ⭐ RATE (ONE TIME)
async function rate(id, stars) {

if (localStorage.getItem("rated_" + id)) {
alert("You already rated this guide ⭐");
return;
}

const { data } = await supabaseClient
.from("guides")
.select("rating, rating_count")
.eq("id", id)
.single()

let currentRating = data.rating || 0
let ratingCount = data.rating_count || 0

// ⭐ average calculate
let newCount = ratingCount + 1
let newRating = ((currentRating * ratingCount) + stars) / newCount

newRating = parseFloat(newRating.toFixed(1))

// UI update
const starBox = document.querySelector(`[data-id='${id}']`);
const starEls = starBox.querySelectorAll(".star");

starEls.forEach((s, i) => {
if (i < stars) s.classList.add("active");
else s.classList.remove("active");
});

const card = starBox.closest('.card');
card.querySelector('.rating-number').innerHTML = `⭐ ${newRating}`

// Supabase update
await supabaseClient
.from("guides")
.update({
rating: newRating,
rating_count: newCount
})
.eq("id", id)

localStorage.setItem("rated_" + id, true)
}


// ❤️ LIKE (ONE TIME)
async function likeGuide(id, el){

if(localStorage.getItem("liked_"+id)){
alert("You already liked ❤️")
return
}

let likeEl = document.getElementById("like-"+id)
let count = parseInt(likeEl.innerText || 0)

count++
likeEl.innerText = count

let heart = el.querySelector(".heart")
heart.classList.add("liked")
heart.textContent = "❤️"

let card = likeEl.closest('.card')
let roleEl = card.querySelector('.role')

// ✅ ONLY ONE SUPABASE CALL
await supabaseClient
.from("guides")
.update({ likes: count })
.eq("id", id)

// ⭐ VERIFIED LOGIC (ONLY ONCE)
if (count >= 25) {
    await supabaseClient
        .from("guides")
        .update({ verified: true })
        .eq("id", id)

    roleEl.innerText = "Aaoza Guide"
}

localStorage.setItem("liked_"+id,true)
}

function shareGuide(name, photo){

const shareData = {
title: "Aaoza Travels Guide",
text: `Check out this professional guide: ${name} on Aaoza Travels Kashmir`,
url: window.location.href
}

if(navigator.share){
navigator.share(shareData)
}else{
alert("Sharing not supported on this device")
}

}

</script>
