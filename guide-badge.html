<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Guides</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(135deg,#eef3ff,#ffffff,#f7f9ff);
}

/* TOP HEADER */
.topbar{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:20px;
font-weight:700;
font-size:22px;
}

.topbar img{
width:35px;
height:35px;
}

.section{
padding:50px 20px;
max-width:1300px;
margin:auto;
}

.title{
text-align:center;
font-size:32px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-top:8px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#ffffff80;
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.06);
transition:0.35s ease;
position:relative;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 25px 50px rgba(0,0,0,0.1);
}

/* card top logo */
.card-brand{
position:absolute;
top:12px;
right:12px;
display:flex;
align-items:center;
gap:4px;
font-size:10px;
font-weight:600;
color:#333;
}

.card-brand img{
width:18px;
height:18px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin:auto;
margin-bottom:15px;
border:4px solid #e6ecff;
}

.name{
font-weight:600;
font-size:18px;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.tick{
width:16px;
height:16px;
background:#1d9bf0;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
color:white;
font-size:11px;
font-weight:bold;
}

.exp{
color:#555;
font-size:14px;
margin-top:5px;
}

.special{
font-size:13px;
color:#777;
margin-top:4px;
}

.rating{
margin-top:8px;
font-size:14px;
color:#f59e0b;
letter-spacing:2px;
}

.badge{
margin-top:12px;
display:inline-block;
background:#edf4ff;
color:#1d4ed8;
padding:6px 12px;
border-radius:30px;
font-size:12px;
font-weight:600;
}

@media(max-width:600px){

.title{
font-size:26px;
}

.section{
padding:30px 15px;
}

}

</style>

</head>

<body>

<!-- TOP LOGO -->
<div class="topbar">
<img src="logo.jpg">
<span>Aaoza Travels Kashmir</span>
</div>

<section class="section">

<div class="title">Meet Our Professional Guides</div>
<div class="subtitle">
Certified local experts for your perfect Kashmir trip
</div>

<div class="grid" id="guideGrid"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

loadGuides()

async function loadGuides(){

const { data, error } = await supabaseClient
.from("guides")
.select("*")

if(error) return

let html = ""

data.forEach(g=>{

html += `
<div class="card">

<div class="card-brand">
<img src="logo.jpg">
<span>Aaoza Travel</span>
</div>

<img src="${g.photo || 'https://via.placeholder.com/150'}" class="avatar">

<div class="name">
${g.name}
<span class="tick">✓</span>
</div>

<div class="exp">
${g.experience || "5+ Years Experience"}
</div>

<div class="special">
${g.tag || "Local Tours"}
</div>

<div class="rating">
★★★★★ 4.9
</div>

<div class="badge">
Verified Guide
</div>

</div>
`

})

document.getElementById("guideGrid").innerHTML = html

}

</script>

</body>
</html>
