<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Guides</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(135deg,#eef3ff,#ffffff,#f7f9ff);
}

.topbar{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:20px;
font-weight:700;
font-size:22px;
}

.topbar img{
width:35px;
}

.section{
padding:50px 20px;
max-width:1300px;
margin:auto;
}

.title{
text-align:center;
font-size:32px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-top:8px;
}

.note{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#ffffffcc;
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.06);
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin:auto;
margin-bottom:15px;
border:4px solid #e6ecff;
}

.name {
    font-weight: 600;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 5px; /* Thoda side space */
    word-break: break-word; /* Bada naam niche adjust ho jaye */
}


.tick {
    width: 22px; /* Size bada diya hai exact match ke liye */
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.tick svg {
    width: 100%;
    height: 100%;
}




.role{
font-size:12px;
color:#2563eb;
margin-top:3px;
font-weight:600;
}

.exp{
color:#555;
font-size:14px;
margin-top:5px;
}

.rating-number{
font-size:14px;
margin-top:5px;
color:#f59e0b;
font-weight:600;
}

.stars{
margin-top:8px;
font-size:20px;
cursor:pointer;
color:#ddd;
}

.star.active{
color:#f59e0b;
}

.like-box{
margin-top:10px;
cursor:pointer;
font-size:14px;
color:#e11d48;
}

.badge{
margin-top:12px;
display:inline-block;
background:#e0f2ff;
color:#0ea5e9;
padding:6px 12px;
border-radius:30px;
font-size:12px;
font-weight:600;
}
.heart{
font-size:18px;
margin-right:5px;
cursor:pointer;
transition:0.2s;
}

.heart.liked{
color:#e11d48;
transform:scale(1.2);
}

.card-topbar{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
justify-content:flex-start;
}

.card-topbar img{
width:22px;
height:22px;
border-radius:50%;
}

.card-topbar span{
font-size:12px;
font-weight:600;
color:#333;
}

</style>
</head>

<body>

<div class="topbar">
<img src="logo.jpg">
<span>Aaoza Travels Kashmir</span>
</div>

<section class="section">

<div class="title">Meet Our Professional Guides</div>
<div class="subtitle">Certified local experts for your perfect Kashmir trip</div>
<div class="note">✔ Guides with 50+ likes get verified blue tick automatically</div>

<div class="grid" id="guideGrid"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

loadGuides()

async function loadGuides(){

const { data } = await supabaseClient
.from("guides")
.select("*")

data.sort((a, b) => {

function getRank(g){
    if(g.type === "Senior Guide") return 1
    if(g.verified) return 2
    return 3
}

let diff = getRank(a) - getRank(b)

if(diff === 0){
    return (b.likes || 0) - (a.likes || 0)
}

return diff

})

let html=""

data.forEach(g=>{

let rating = parseFloat(g.rating || 0).toFixed(1)
let likes = g.likes || 0

// ⭐ AUTO ROLE SYSTEM
let role = g.type

if (g.type === "Senior Guide") {
    role = "Senior Guide"
} 
else if (g.type === "Local Guide" && g.verified) {
    role = "Aaoza Guide"
}

let tick = likes >= 50 ? `
<span class="tick">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34z" fill="#1DA1F2"/>
        <path d="M9.5 14.58l-2.79-2.79-1.21 1.21 4 4 8-8-1.21-1.21z" fill="#ffffff"/>
    </svg>
</span>` : "";

let verified = likes >= 50 ? `<div class="badge">Verified Guide</div>` : ""

html += `
<div class="card">
    <div class="card-topbar">
        <img src="logo.jpg">
        <span>Aaoza Travels</span>
    </div>

<img src="${g.photo || 'https://via.placeholder.com/150'}" class="avatar">

<div class="name">${g.name} ${tick}</div>

<div class="role">${role}</div>

<div class="exp">${g.experience || '5+ Years Experience'}</div>

<div class="rating-number">⭐ ${rating}</div>

<div class="stars" data-id="${g.id}">
<span class="star" onclick="rate('${g.id}',1)">★</span>
<span class="star" onclick="rate('${g.id}',2)">★</span>
<span class="star" onclick="rate('${g.id}',3)">★</span>
<span class="star" onclick="rate('${g.id}',4)">★</span>
<span class="star" onclick="rate('${g.id}',5)">★</span>
</div>

<div class="like-box" onclick="likeGuide('${g.id}', this)">
<span class="heart">🤍</span>
<span id="like-${g.id}">${likes}</span> Likes
</div>

${verified}

</div>
`

})

document.getElementById("guideGrid").innerHTML=html

}

// ⭐ RATE (ONE TIME)
async function rate(id, stars) {
    if (localStorage.getItem("rated_" + id)) {
        alert("You already rated this guide ⭐");
        return;
    }

    // 1. UI update karein (Stars color change)
    const starBox = document.querySelector(`[data-id='${id}']`);
    const starEls = starBox.querySelectorAll(".star");
    starEls.forEach((s, i) => {
        if (i < stars) s.classList.add("active");
        else s.classList.remove("active");
    });

    // 2. Rating Number ko turant screen par badle (⭐ Number update)
    // Hum card ke andar 'rating-number' class wali div ko dhoond kar text badal rahe hain
    const card = starBox.closest('.card');
    const ratingDisplay = card.querySelector('.rating-number');
    ratingDisplay.innerHTML = `⭐ ${parseFloat(stars).toFixed(1)}`;

    // 3. Supabase mein update karein
    try {
        await supabaseClient
            .from("guides")
            .update({ rating: stars })
            .eq("id", id);
            
        localStorage.setItem("rated_" + id, true);
    } catch (error) {
        console.error("Error updating rating:", error);
    }
}


// ❤️ LIKE (ONE TIME)
async function likeGuide(id, el){

if(localStorage.getItem("liked_"+id)){
alert("You already liked ❤️")
return
}

let likeEl = document.getElementById("like-"+id)
let count = parseInt(likeEl.innerText || 0)

count++
likeEl.innerText = count

let heart = el.querySelector(".heart")
heart.classList.add("liked")
heart.textContent = "❤️"

let card = likeEl.closest('.card')
let roleEl = card.querySelector('.role')

// ✅ ONLY ONE SUPABASE CALL
await supabaseClient
.from("guides")
.update({ likes: count })
.eq("id", id)

// ⭐ VERIFIED LOGIC (ONLY ONCE)
if (count >= 25) {
    await supabaseClient
        .from("guides")
        .update({ verified: true })
        .eq("id", id)

    roleEl.innerText = "Aaoza Guide"
}

localStorage.setItem("liked_"+id,true)
}

</script>

</body>
</html>
