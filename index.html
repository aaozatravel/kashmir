<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aaoza Travel Kashmir - Coming Soon</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#000,#1a0000,#330000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* 🔥 MAIN BOX */
.container{
  text-align:center;
  padding:25px;
  max-width:350px;
}

/* 🔥 LOGO */
.logo{
  width:100px;
  border-radius:20px;
  box-shadow:0 0 25px red;
  margin-bottom:15px;
}

/* 🔥 TITLE */
h1{
  margin:0;
  font-size:22px;
}

h2{
  margin:10px 0;
  color:#ff3c00;
  font-size:20px;
}

/* 🔥 TEXT */
p{
  font-size:14px;
  color:#ccc;
  line-height:1.5;
}

/* 🔥 LOCATIONS */
.locations{
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.locations span{
  background:#111;
  border:1px solid red;
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
}

/* 🔥 GLOW */
.glow{
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ box-shadow:0 0 10px red; }
  to{ box-shadow:0 0 30px red; }
}

/* 🔥 LOADER */
.loader{
  margin-top:20px;
  height:5px;
  width:100%;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.loader span{
  display:block;
  height:100%;
  width:40%;
  background:red;
  animation:load 2s infinite;
}

@keyframes load{
  0%{margin-left:-40%;}
  100%{margin-left:100%;}
}

/* 🔥 TIMER */
#timerText{
  margin-top:15px;
  font-size:16px;
  color:#ff3c00;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

  <img src="logo.jpg" class="logo glow">

  <h1>Aaoza Travel Kashmir</h1>
  <h2>🚧 Coming Soon</h2>

  <p>
    Our team is currently working on the Hotels section.<br>
    The app will be live very soon after upgrade completion.
  </p>

  <div class="locations">
    <span>📍 Gulmarg</span>
    <span>📍 Sonmarg</span>
    <span>📍 Pahalgam</span>
    <span>📍 Srinagar</span>
  </div>

  <!-- 🔥 TIMER -->
  <h3 id="timerText">Launching in: --:--:--</h3>

  <!-- 🔥 LOADER -->
  <div class="loader">
    <span></span>
  </div>

</div>

<script>

// 🔥 first time open
if(!localStorage.getItem("startTime")){
  localStorage.setItem("startTime", new Date().getTime());
}

// 🔥 saved start time
const startTime = parseInt(localStorage.getItem("startTime"));

// 🔥 update timer (COUNT UP)
function updateTimer(){

  const now = new Date().getTime();
  const elapsed = now - startTime;

  let hours = Math.floor(elapsed / (1000 * 60 * 60));
  let minutes = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
  let seconds = Math.floor((elapsed % (1000 * 60)) / 1000);

  document.getElementById("timerText").innerText =
    `⏳ Working since: ${hours}h ${minutes}m ${seconds}s`;

}

// run
setInterval(updateTimer,1000);
updateTimer();

</script>

</body>
</html>
