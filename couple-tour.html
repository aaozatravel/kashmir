<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Romantic Kashmir Couple Tour Package | Aaoza Travel Kashmir</title>

<meta name="description" content="Book romantic Kashmir couple tour package with Aaoza Travel. Enjoy candle light dinner, photoshoot, Gondola ride and explore Srinagar, Sonmarg & Gulmarg.">

<meta name="keywords" content="Kashmir couple tour, romantic Kashmir package, honeymoon Kashmir, Srinagar couple trip, Gulmarg honeymoon package">

<meta name="author" content="Aaoza Travel Kashmir">
<meta name="robots" content="index, follow">

<!-- Social Media -->
<meta property="og:title" content="Romantic Kashmir Couple Tour Package">
<meta property="og:description" content="Perfect honeymoon & couple trip in Kashmir with romantic activities">
<meta property="og:image" content="https://i.ibb.co/7tXWb6LN/file-000000003e4071fa90b830d235ec710c.png">
<meta property="og:type" content="website">

<link rel="canonical" href="https://aaozatravel.github.io/kashmir/couple-tour.html">

<!-- CSS -->
<link rel="stylesheet" href="couple.css">

</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<section class="tour-details">

<div class="tour-hero">
<img src="sonmarg.jpg" class="single-image">
<div class="couple-badge">❤️ Couple Special</div>
</div>

<h1>Romantic Kashmir Couple Tour</h1>

<div class="tour-rating">
<span class="badge">4 Nights / 5 Days</span>
<span>⭐⭐⭐⭐⭐ Perfect for Couples</span>
</div>

<div class="price-box">
<div>
<p>Starts From</p>
<h2 id="topPrice">₹19,999</h2>
</div>

<button class="big-book-btn" onclick="validateBooking()">
Book Romantic Trip
</button>
</div>

<!-- Activities -->
<div class="activity-section">
<h3>💑 Romantic Activities</h3>

<div class="activity-grid">

<label class="activity-card">
<input type="checkbox" class="activity" data-price="2500" value="Couple Photoshoot">
<div class="icon">📸</div>
<p>Couple Photoshoot ₹2500</p>
</label>

<label class="activity-card">
<input type="checkbox" class="activity" data-price="1500" value="Candle Light Dinner">
<div class="icon">🕯️</div>
<p>Candle Light Dinner ₹1500</p>
</label>

<label class="activity-card">
<input type="checkbox" id="gondolaCheck" onchange="toggleGondola()">
<div class="icon">🚡</div>
<p>Gondola Ride</p>
</label>

</div>

<div id="gondolaOptions" class="gondola-box">

<label>
<input type="checkbox" class="gondola-option" value="944">
Phase 1 ₹944
</label>

<label>
<input type="checkbox" class="gondola-option" value="2054">
Phase 2 ₹2054
</label>

<label>
<input type="checkbox" class="gondola-option" value="300">
Chairlift ₹300
</label>

</div>
</div>

<!-- Places -->
<div class="activity-section">
<h3>📍 Select Romantic Places</h3>

<div class="activity-grid">

<label class="activity-card place-card">
<input type="checkbox" class="place" data-price="10000" value="Sonmarg" onchange="limitPlaces(this)">
<img src="sonmarg.jpg">
<p>Sonmarg ₹10000</p>
</label>

<label class="activity-card place-card">
<input type="checkbox" class="place" data-price="3000" value="Doodhpathri" onchange="limitPlaces(this)">
<img src="doodhpathri.jpg">
<p>Doodhpathri ₹3000</p>
</label>

<label class="activity-card place-card">
<input type="checkbox" class="place" data-price="5000" value="Srinagar" onchange="limitPlaces(this)">
<img src="dallake.jpg">
<p>Srinagar ₹5000</p>
</label>

</div>
</div>

<!-- Departure -->
<div class="departure-box">
<h2>Select Departure</h2>
<div id="monthContainer"></div>
</div>

</section>

<script>

let selectedDeparture = null
let selectedPrice = null

function generateCards(){

const data = [
{start:"Apr 14, 2026", price:"₹32,000"},
{start:"Apr 20, 2026", price:"₹35,000"},
{start:"May 05, 2026", price:"₹33,990"}
]

let html=""

data.forEach(d=>{
html+=`
<div class="depart-card" onclick="selectDeparture('${d.start}','${d.price}',this)">
<h4>${d.start}</h4>
<p>${d.price}</p>
</div>
`
})

document.getElementById("monthContainer").innerHTML = html
}

function selectDeparture(date,price,el){

selectedDeparture=date
selectedPrice=price

document.getElementById("topPrice").innerText=price

localStorage.setItem("selectedDeparture",date)
localStorage.setItem("selectedPrice",price)

document.querySelectorAll(".depart-card").forEach(c=>{
c.classList.remove("selected")
})

el.classList.add("selected")
}

function validateBooking(){

if(!selectedDeparture){
alert("Please select departure")
return
}

saveActivities()
savePlaces()

window.location.href="booking.html"
}

function saveActivities(){

let selected=[]
let gondola=[]
let gondolaTotal=0

document.querySelectorAll(".activity:checked").forEach(el=>{
selected.push({
name:el.value,
price:parseInt(el.dataset.price)
})
})

document.querySelectorAll(".gondola-option:checked").forEach(el=>{
gondola.push(el.parentElement.innerText)
gondolaTotal += parseInt(el.value)
})

localStorage.setItem("selectedActivities",JSON.stringify(selected))
localStorage.setItem("selectedGondola",JSON.stringify(gondola))
localStorage.setItem("gondolaTotal",gondolaTotal)
}

function toggleGondola(){
document.getElementById("gondolaOptions").style.display =
document.getElementById("gondolaCheck").checked ? "block" : "none"
}

function limitPlaces(clicked){

const checked=document.querySelectorAll(".place:checked")

if(checked.length>3){
clicked.checked=false
alert("Only 3 places allowed")
return
}

savePlaces()
}

function savePlaces(){

let places=[]
let total=0

document.querySelectorAll(".place:checked").forEach(el=>{

let price=parseInt(el.dataset.price)

places.push({
name:el.value,
price:price
})

total+=price
})

localStorage.setItem("selectedPlaces",JSON.stringify(places))
localStorage.setItem("placesTotal",total)
}

generateCards()

</script>

</body>
</html>
