<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kashmir Gallery - Aaoza Travel Kashmir</title>

<link rel="stylesheet" href="gallery.css">
</head>

<body>

<!-- 🔝 HEADER -->
<header class="top-bar">
  <img src="logo.jpg" class="logo">
  <h2>Aaoza Travel</h2>
</header>

<h2 class="gallery-title">Kashmir Gallery</h2>

<!-- 🔘 FILTER -->
<div class="filters">
  <button onclick="filterGallery('all')">All</button>
  <button onclick="filterGallery('gulmarg')">Gulmarg</button>
  <button onclick="filterGallery('sonmarg')">Sonmarg</button>
  <button onclick="filterGallery('srinagar')">Srinagar</button>
</div>

<!-- 📸 GALLERY -->
<div class="gallery-container" id="gallery">

<img src="g1.jpg" data-cat="gulmarg">
<img src="g2.jpg" data-cat="sonmarg">
<img src="g3.jpg" data-cat="gulmarg">
<img src="g4.jpg" data-cat="srinagar">
<img src="g5.jpg" data-cat="srinagar">
<img src="g6.jpg" data-cat="sonmarg">
<img src="g7.jpg" data-cat="gulmarg">
<img src="g8.jpg" data-cat="srinagar">
<img src="g9.jpg" data-cat="sonmarg">
<img src="g10.jpg" data-cat="gulmarg">

</div>

<!-- 🔍 VIEWER -->
<div class="viewer" id="viewer">
<span class="close-btn" onclick="closeViewer()">✖</span>

<span class="nav-btn prev" onclick="prevImage()">❮</span>
<img id="viewerImg">
<span class="nav-btn next" onclick="nextImage()">❯</span>
</div>

<!-- 📱 BOTTOM NAV -->
<div class="bottom-nav">
<a href="index.html">Home</a>
<a href="tour.html">Tours</a>
<a href="gallery.html">Gallery</a>
<a href="account.html">Account</a>
</div>

<script>

// 📸 IMAGES
let images = document.querySelectorAll("#gallery img")
let viewer = document.getElementById("viewer")
let viewerImg = document.getElementById("viewerImg")

let currentIndex = 0

images.forEach((img, index)=>{
img.addEventListener("click", ()=>{
currentIndex = index
showImage()
})
})

// 🔍 SHOW
function showImage(){
viewer.style.display = "flex"
viewerImg.src = images[currentIndex].src
}

// ❌ CLOSE
function closeViewer(){
viewer.style.display = "none"
}

// ➡️ NEXT
function nextImage(){
currentIndex++
if(currentIndex >= images.length){
currentIndex = 0
}
showImage()
}

// ⬅️ PREV
function prevImage(){
currentIndex--
if(currentIndex < 0){
currentIndex = images.length - 1
}
showImage()
}

// 🔥 FILTER
function filterGallery(cat){
let imgs = document.querySelectorAll("#gallery img")

imgs.forEach((img)=>{
if(cat === "all"){
img.style.display = "block"
}else{
img.style.display = img.dataset.cat === cat ? "block" : "none"
}
})
}

</script>

<script src="back.js"></script>

</body>
</html>
