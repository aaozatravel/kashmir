<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Account - Aaoza Travels Kashmir</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="account.css">
</head>

<body class="account-body" onload="initPage()">
  
  <!-- 🔔 ALERT BOX (ADD THIS) -->
<div id="topAlert" class="top-alert"></div>

<div class="account-header">
<img src="logo.jpg" class="account-header-logo">
<h2>Aaoza Travels Kashmir</h2>
</div>

<div class="account-container">

<!-- PROFILE -->
<div class="profile-card">

<img id="profileImg" src="user.png" class="profile-avatar">

<h3 id="userName">Guest User</h3>
<p id="userPhone">Phone: Not Available</p>
<p id="userEmail">Email: Not Available</p>

<div onclick="toggleSettings()" class="edit-online">
● Edit Profile (Online)
</div>
<button onclick="logoutUser()" class="logout-mini">Logout</button>

</div>

<!-- SETTINGS -->
<div id="settingsBox" style="display:none; margin-top:15px;">

<h3>Edit Profile</h3>

<input id="newName" placeholder="New Name">

<!-- IMAGE UPLOAD (FIXED) -->
<input type="file" id="newImage" accept="image/*">

<h3>Change Email / Phone (Request Only)</h3>

<input id="newEmail" placeholder="New Email">
<input id="newPhone" placeholder="New Phone">

<button onclick="saveSettings()">Send Update Request</button>

</div>

<!-- GUIDE LOGIN (OLD SYSTEM KEPT) -->
<div class="guide-access">

<button class="guide-open-btn" onclick="handleGuideClick()">
<img src="guide.png">
<span>Guide Login</span>
</button>

<div class="guide-login-box" id="guideLoginBox" style="display:none;">
<input type="email" id="guideEmail" placeholder="Guide Email">
<input type="password" id="guidePassword" placeholder="Guide Password">
<button onclick="loginGuide()">Login</button>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

let currentUserEmail = null;

// ================= INIT =================
async function initPage(){

  const { data: { session } } = await supabaseClient.auth.getSession()

  // 🚫 agar login nahi hai to redirect
  if(!session){
    window.location.href = "login.html"
    return
  }

  currentUserEmail = session.user.email
  loadUserProfile()
}

// ================= LOAD PROFILE =================
async function loadUserProfile(){

  const { data: userData, error } = await supabaseClient
    .from("users")
    .select("*")
    .eq("email", currentUserEmail)
    .single()

  if(error){
    console.log("Load error:", error)
    return
  }

  // 🔥 FORCE DOM UPDATE (IMPORTANT)
  document.getElementById("userName").innerText = userData.name || "Guest User"
  document.getElementById("userPhone").innerText = "Phone: " + (userData.phone || "Not Available")
  document.getElementById("userEmail").innerText = "Email: " + (userData.email || "Not Available")

  document.getElementById("profileImg").src = userData.image || "user.png"
}

// ================= TOGGLE SETTINGS =================
function toggleSettings(){
document.getElementById("settingsBox").style.display =
document.getElementById("settingsBox").style.display === "none"
? "block"
: "none"
}

// ================= SAVE SETTINGS =================
async function saveSettings(){

  const newName = document.getElementById("newName").value
  const newEmail = document.getElementById("newEmail").value
  const newPhone = document.getElementById("newPhone").value
  const file = document.getElementById("newImage").files[0]

  const name = document.getElementById("userName").innerText
  const phone = document.getElementById("userPhone").innerText.replace("Phone: ","")
  const email = document.getElementById("userEmail").innerText.replace("Email: ","")

  let imageUrl = null

  // ================= IMAGE UPLOAD =================
  if(file){
    const fileName = Date.now() + "_" + file.name

    const { error } = await supabaseClient
      .storage
      .from("profile-images")
      .upload(fileName, file)

    if(!error){
      const { data } = supabaseClient
        .storage
        .from("profile-images")
        .getPublicUrl(fileName)

      imageUrl = data.publicUrl
    }
  }

  // ================= UPDATE PROFILE (NAME + IMAGE) =================
  const updates = {}

  if(newName) updates.name = newName
  if(imageUrl) updates.image = imageUrl

  if(Object.keys(updates).length > 0){
    await supabaseClient
      .from("users")
      .update(updates)
      .eq("email", currentUserEmail)
  }

  // ================= WHATSAPP REQUEST (OPTIONAL) =================
  if(newEmail || newPhone){

    let message = `
📩 *Profile Update Request*

👤 Name: ${name}
📧 Current Email: ${email}
📞 Current Phone: ${phone}

➡️ New Email: ${newEmail || "No change"}
➡️ New Phone: ${newPhone || "No change"}

⚠️ Please update my details.
    `

    let url = `https://wa.me/917051932522?text=${encodeURIComponent(message)}`
    window.open(url, "_blank")
  }

  showAlert("Profile updated successfully ✅","success")
playSound()
  setTimeout(()=>{
    loadUserProfile()
  },500)

  document.getElementById("settingsBox").style.display = "none"
}

// ================= GUIDE LOGIN =================
function handleGuideClick(){

  // 🔥 ALWAYS SHOW LOGIN BOX
  document.getElementById("guideLoginBox").style.display = "block"

  // optional: clear old inputs every time
  document.getElementById("guideEmail").value = ""
  document.getElementById("guidePassword").value = ""
}

async function loginGuide(){

const email = document.getElementById("guideEmail").value
const password = document.getElementById("guidePassword").value

if(!email || !password){
showAlert("Fill guide credentials ❗","error")
return
}

const { data, error } = await supabaseClient
.from("guides")
.select("*")
.eq("email", email)
.eq("password", password)
.single()

if(error || !data){
showAlert("Invalid guide login ❌","error")
playSound()
return
}

localStorage.setItem("guide", JSON.stringify(data))

showAlert("Guide login success 🎉","success")
playSound()

setTimeout(()=>{
window.location.href="guide-dashboard.html"
},1200)

}

// ================= LOGOUT =================
async function logoutUser(){

await supabaseClient.auth.signOut()
localStorage.clear()

window.location.href = "login.html"
}
function showAlert(msg,type="success"){

if (navigator.vibrate) {
  if (type === "success") {
    navigator.vibrate([100, 50, 100])
  } else {
    navigator.vibrate([300])
  }
}


function playSound(){
  const audio = new Audio("sound.mp3")
  audio.currentTime = 0
  audio.play().catch(err=>{
    console.log("Sound blocked:", err)
  })
}


const alertBox = document.getElementById("topAlert")

let icon = ""

if(type === "success"){
icon = `
<svg viewBox="0 0 24 24">
<path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34..." fill="#22c55e"/>
<path d="M9.5 14.58l-2.79-2.79-1.21 1.21 4 4 8-8-1.21-1.21z" fill="#fff"/>
</svg>`
}else{
icon = `
<svg viewBox="0 0 24 24">
<path d="M22.25 12c0-1.43..." fill="#ef4444"/>
<path d="M8 8l8 8M16 8l-8 8" stroke="#fff" stroke-width="2"/>
</svg>`
}

alertBox.className = "top-alert show " + type

alertBox.innerHTML = `
<div class="alert-content">
${icon}
<span>${msg}</span>
</div>
`

setTimeout(()=>{
alertBox.classList.remove("show")
},2500)
}



</script>
<script src="back.js"></script>

</body>
</html>
