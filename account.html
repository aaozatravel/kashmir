<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Account - Aaoza Travel Kashmir</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="account.css">

</head>

<body class="account-body" onload="initPage()">

<div class="account-header">
<img src="logo.jpg" class="account-header-logo">
<h2>Aaoza Travels Kashmir</h2>
</div>

<div class="account-container">

<!-- PROFILE -->
<div class="profile-card">
<img src="user.png" class="profile-avatar">
<h3 id="userName">Guest User</h3>
<p id="userPhone">Phone: Not Available</p>
<p id="userEmail">Email: Not Available</p>

<button onclick="logoutUser()" class="logout-btn">Logout</button>
</div>

<!-- GUIDE LOGIN -->
<div class="guide-access">

<button class="guide-open-btn" onclick="handleGuideClick()">
<img src="guide.png">
<span>Guide Login</span>
</button>

<div class="guide-login-box" id="guideLoginBox" style="display:none;">
<input type="email" id="guideEmail" placeholder="Guide Email">
<input type="password" id="guidePassword" placeholder="Guide Password">
<button onclick="loginGuide()">Login</button>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

// ===============================
// INIT
// ===============================
async function initPage(){

const { data:{ user } } = await supabaseClient.auth.getUser()

if(!user){
window.location.href="login.html"
return
}

loadUserProfile()
}

// ===============================
// GUIDE CLICK (AUTO LOGIN)
// ===============================
function handleGuideClick(){

const guide = localStorage.getItem("guide")

if(guide){
window.location.href = "guide-dashboard.html"
return
}

// otherwise open login
toggleGuideLogin()
}

// ===============================
// TOGGLE LOGIN BOX
// ===============================
function toggleGuideLogin(){
const box = document.getElementById("guideLoginBox")

box.style.display = (box.style.display === "none") ? "flex" : "none"
}

// ===============================
// LOGIN GUIDE
// ===============================
async function loginGuide(){

const email = document.getElementById("guideEmail").value
const password = document.getElementById("guidePassword").value

const { data, error } = await supabaseClient
.from("guides")
.select("*")
.eq("email", email)
.eq("password", password)
.single()

if(error || !data){
alert("Invalid guide login ❌")
return
}

// 🔥 SAVE LOGIN
localStorage.setItem("guide", JSON.stringify(data))

// 🔥 DIRECT REDIRECT
window.location.href="guide-dashboard.html"
}

// ===============================
// USER PROFILE
// ===============================
async function loadUserProfile(){

const { data:{ user } } = await supabaseClient.auth.getUser()
if(!user) return

const { data } = await supabaseClient
.from("users")
.select("*")
.eq("email", user.email)
.single()

if(!data) return

userName.innerText = data.name
userPhone.innerText = "Phone: " + data.phone
userEmail.innerText = "Email: " + data.email
}

// ===============================
// LOGOUT USER
// ===============================
async function logoutUser(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

</script>

</body>
</html>
