<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="account.css">

<style>
.progress-box{
margin-top:20px;
background:#fff;
padding:15px;
border-radius:8px;
}

.progress-item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px dashed #ddd;
}

.tick{color:green;font-weight:bold;}
.cross{color:red;font-weight:bold;}
</style>

</head>

<body class="account-body" onload="initPage()">

<div class="account-header">
<img src="logo.jpg" class="account-header-logo">
<h2>Aaoza Travels Kashmir</h2>
</div>

<div class="account-container">

<div class="profile-card">
<img src="user.png" class="profile-avatar">
<h3 id="userName">Guest User</h3>
<p id="userPhone">Phone: Not Available</p>
<p id="userEmail">Email: Not Available</p>

<button onclick="logoutUser()" class="logout-btn">Logout</button>

</div>

<div class="progress-box">
<h3>Trip Target Map</h3>
<div id="progressContainer">No trip data</div>
</div>

<div class="guide-login-box">
<h3>Guide Login</h3>
<input type="email" id="guideEmail" placeholder="Guide Email">
<input type="password" id="guidePassword" placeholder="Guide Password">
<button onclick="loginGuide()">Login as Guide</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function initPage(){

const { data:{ user } } = await supabaseClient.auth.getUser()

// agar login nahi hai → login page
if(!user){
window.location.href="login.html"
return
}

loadUserProfile()
loadProgress()

setInterval(loadProgress,5000)
}

async function loginGuide(){

const guideEmail = document.getElementById("guideEmail");
const guidePassword = document.getElementById("guidePassword");

const { data, error } = await supabaseClient
.from("guides")
.select("*")
.eq("email", guideEmail.value)
.eq("password", guidePassword.value)
.single()

if(error || !data){
alert("Invalid guide login")
return
}

localStorage.setItem("guide", JSON.stringify(data))
window.location.href="guide-dashboard.html"
}

async function loadUserProfile(){

const { data:{ user } } = await supabaseClient.auth.getUser()
if(!user) return

const { data } = await supabaseClient
.from("users")
.select("*")
.eq("email", user.email)
.single()

if(!data) return

userName.innerText = data.name
userPhone.innerText = "Phone: " + data.phone
userEmail.innerText = "Email: " + data.email
}

async function loadProgress(){

const { data:{ user } } = await supabaseClient.auth.getUser()
if(!user) return

const { data } = await supabaseClient
.from("bookings")
.select("*")
.eq("user_email", user.email)
.order("created_at",{ascending:false})
.limit(1)

if(!data || data.length === 0) return

const booking = data[0]

let parsed = {}
try{
parsed = JSON.parse(booking.traveller_details || "{}")
}catch(e){}

let places = parsed.places || []
let activities = parsed.activities || []
let gondola = parsed.gondola || []

let hotelDays = booking.hotel_days || []
if(typeof hotelDays === "string"){
try{ hotelDays = JSON.parse(hotelDays) }catch(e){}
}

let progress = booking.progress || {}

if(typeof progress === "string"){
try{
progress = JSON.parse(progress)
}catch(e){
progress = {}
}
}

if(!progress) progress = {}

const progressContainer = document.getElementById("progressContainer")
progressContainer.innerHTML = ""

let html = ""

hotelDays.forEach((d,i)=>{
let key="hotel_"+i
html += `<div class="progress-item">
<span>${d.day} - ${d.hotel}</span>
<span class="${progress[key]?'tick':'cross'}">${progress[key]?'✔':'✖'}</span>
</div>`
})

places.forEach((p,i)=>{
let key="place_"+i
html += `<div class="progress-item">
<span>${p.name}</span>
<span class="${progress[key]?'tick':'cross'}">${progress[key]?'✔':'✖'}</span>
</div>`
})

activities.forEach((a,i)=>{
let key="activity_"+i
html += `<div class="progress-item">
<span>${a.name}</span>
<span class="${progress[key]?'tick':'cross'}">${progress[key]?'✔':'✖'}</span>
</div>`
})

gondola.forEach((g,i)=>{
let key="gondola_"+i
html += `<div class="progress-item">
<span>${g}</span>
<span class="${progress[key]?'tick':'cross'}">${progress[key]?'✔':'✖'}</span>
</div>`
})

progressContainer.innerHTML = html || "No trip assigned"
}

// 👇 yaha add karo
async function logoutUser(){
await supabaseClient.auth.signOut()
window.location.href="login.html"
}

</script>

</body>
</html>
