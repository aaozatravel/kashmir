<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Aaoza Travels Kashmir</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-box">

<img src="logo.jpg">
<h2>Aaoza Travels Kashmir</h2>

<h3 id="formTitle">Login</h3>

<input type="text" id="name" placeholder="Full Name" style="display:none">
<input type="text" id="phone" placeholder="Phone Number" style="display:none">

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<p class="forgot" onclick="forgotPassword()">Forgot Password?</p>

<button onclick="loginUser()">Login</button>
<button onclick="signupUser()">Signup</button>

<p class="switch" onclick="toggleMode()">Create account</p>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<!-- FIREBASE -->
<script type="module">
import { initNotifications } from "./firebase.js";
window.initNotifications = initNotifications;
</script>

<script>

let signupMode = false;

// 🔁 SWITCH LOGIN / SIGNUP
function toggleMode(){
signupMode = !signupMode;

document.getElementById("name").style.display = signupMode ? "block":"none";
document.getElementById("phone").style.display = signupMode ? "block":"none";
document.getElementById("formTitle").innerText = signupMode ? "Signup":"Login";
}

// 📝 SIGNUP
async function signupUser(){

if(!signupMode){
alert("Switch to signup mode first");
return;
}

const name = nameInput();
const phone = phoneInput();
const email = emailInput();
const password = passwordInput();

if(!name || !phone || !email || !password){
alert("Fill all fields");
return;
}

const { error } = await supabaseClient.auth.signUp({ email, password });

if(error){
alert(error.message);
return;
}

// save profile
await supabaseClient.from("users").insert({
name,
phone,
email
});

alert("Signup successful ✅");
}

// 🔐 LOGIN (FINAL FIX)
async function loginUser(){

const email = emailInput();
const password = passwordInput();

if(!email || !password){
alert("Enter email & password");
return;
}

const { data, error } = await supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){
alert(error.message);
return;
}

// 🔔 ASK PERMISSION + SHOW NOTIFICATION
Notification.requestPermission().then(permission => {
  if(permission === "granted"){
    new Notification("Welcome 🎉", {
      body: "Login successful - Aaoza Travel Kashmir ✈️",
      icon: "logo.jpg"
    });
  }
});

// 🔥 FIREBASE INIT (background push)
if(window.initNotifications){
  window.initNotifications(); // NO await
}

// ✅ INSTANT REDIRECT
window.location.href = "account.html";
}

// 🔧 HELPERS
function emailInput(){
return document.getElementById("email").value.trim();
}

function passwordInput(){
return document.getElementById("password").value.trim();
}

function nameInput(){
return document.getElementById("name").value.trim();
}

function phoneInput(){
return document.getElementById("phone").value.trim();
}

// 🔁 FORGOT PASSWORD
async function forgotPassword(){

const email = emailInput();

if(!email){
alert("Enter email first");
return;
}

const { error } = await supabaseClient.auth.resetPasswordForEmail(email,{
redirectTo: window.location.origin + "/reset-password.html"
});

if(error){
alert(error.message);
return;
}

alert("Reset link sent 📩");
}

</script>

</body>
</html>
