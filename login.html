<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaoza Travels Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
<div class="left">

  <img src="logo.jpg" style="width:90px; margin-bottom:10px;">

  <h1>Aaoza Travels Kashmir</h1>

  <p>Welcome Back 👋<br>
  Login to continue your journey with Aaoza Travels Kashmir</p>

</div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <!-- 🔔 ALERT -->
    <div id="topAlert" class="top-alert"></div>

    <div class="box">

      <h2 id="title">Login</h2>

      <input type="text" id="name" placeholder="Full Name" class="hide">
      <input type="text" id="phone" placeholder="Phone Number" class="hide">

      <input type="email" id="email" placeholder="Email">


<div class="password-box">
  <input type="password" id="password" placeholder="Password">

  <!-- 👁 OPEN EYE (hidden by default) -->
  <svg id="eyeOpen" class="eye-icon hide" onclick="togglePassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    <path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
  </svg>

  <!-- 🙈 CLOSED EYE (visible by default) -->
  <svg id="eyeClose" class="eye-icon" onclick="togglePassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.956 9.956 0 012.042-3.368M6.223 6.223A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.97 9.97 0 01-4.293 5.774M15 12a3 3 0 00-3-3m0 0a3 3 0 00-3 3m3-3v6m9-9L3 21"/>
  </svg>

</div>



      <button onclick="handleAuth()">Continue</button>

      <p class="switch" onclick="toggleMode()">
        <span id="switchText">Create account</span>
      </p>

      <p class="forgot" onclick="forgotPasswordHandler()">Forgot Password?</p>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

// ==========================
// ALERT (SAME - DO NOT CHANGE)
// ==========================
function showAlert(msg,type="success"){
  // 📳 VIBRATION (MOBILE ONLY)
if (navigator.vibrate) {
  if (type === "success") {
    navigator.vibrate([80, 40, 80])  // soft success vibration
  } else {
    navigator.vibrate(400)          // error vibration
  }
}
const alertBox = document.getElementById("topAlert")

let icon = ""

if(type === "success"){
icon = `
<svg viewBox="0 0 24 24">
<path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34z" fill="#22c55e"/>
<path d="M9.5 14.58l-2.79-2.79-1.21 1.21 4 4 8-8-1.21-1.21z" fill="#ffffff"/>
</svg>`
}else{
icon = `
<svg viewBox="0 0 24 24">
<path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34z" fill="#ef4444"/>
<path d="M15 9l-6 6M9 9l6 6" stroke="#fff" stroke-width="2"/>
</svg>`
}

alertBox.className = "top-alert show " + type

alertBox.innerHTML = `
<div class="alert-content">
${icon}
<span>${msg}</span>
</div>
`

setTimeout(()=>alertBox.classList.remove("show"),2500)
}

// ==========================
// MODE CONTROL
// ==========================
let isSignup = false;

function toggleMode(){
isSignup = !isSignup;

document.getElementById("name").classList.toggle("hide")
document.getElementById("phone").classList.toggle("hide")

document.getElementById("title").innerText = isSignup ? "Create Account" : "Login"
document.getElementById("switchText").innerText = isSignup ? "Already have account? Login" : "Create account"
}

// ==========================
// LOGIN / SIGNUP ONE BUTTON
// ==========================
async function handleAuth(){

const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()

if(!email || !password){
showAlert("Fill email & password","error")
return
}

// ================= LOGIN =================
if(!isSignup){

const { error } = await supabaseClient.auth.signInWithPassword({
email,
password
})

if(error){
showAlert(error.message,"error")
return
}

showAlert("Login success 🎉","success")

// 🔊 play sound
const audio = new Audio("login.mp3")
audio.play()

setTimeout(()=>window.location.href="index.html",1500)

}

// ================= SIGNUP =================
else{

const name = document.getElementById("name").value.trim()
const phone = document.getElementById("phone").value.trim()

if(!name || !phone){
showAlert("Fill all fields","error")
return
}

const { data, error } = await supabaseClient.auth.signUp({
email,
password
})

if(error){
showAlert(error.message,"error")
return
}

// save profile
await supabaseClient.from("users").insert({
id: data.user.id,
name,
phone,
email
})

showAlert("Account created 🎉","success")

setTimeout(()=>window.location.href="index.html",1500)
}
}

// ==========================
// FORGOT PASSWORD FIXED
// ==========================
async function forgotPasswordHandler(){

const email = document.getElementById("email").value.trim()

if(!email){
showAlert("Enter email","error")
return
}

const { error } = await supabaseClient.auth.resetPasswordForEmail(email,{
redirectTo: window.location.origin + "/kashmir/reset-password.html"

})

if(error){
showAlert(error.message,"error")
return
}

showAlert("Reset link sent 📩","success")
}

</script>
<script>
function togglePassword(){

const input = document.getElementById("password")
const eyeOpen = document.getElementById("eyeOpen")
const eyeClose = document.getElementById("eyeClose")

if(input.type === "password"){
  input.type = "text"

  eyeOpen.classList.add("hide")
  eyeClose.classList.remove("hide")

}else{
  input.type = "password"

  eyeOpen.classList.remove("hide")
  eyeClose.classList.add("hide")
}

}
</script>


</body>
</html>2
