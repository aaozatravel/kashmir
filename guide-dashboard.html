<!DOCTYPE html>
<html>
<head>
<title>Guide Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

/* HEADER */
.top-header{
background:#1c3faa;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

.top-header img{
width:40px;
height:40px;
}

.container{
display:flex;
gap:15px;
padding:15px;
flex-wrap:wrap;
}

/* LEFT CARD */
.id-card{
width:320px;
background: linear-gradient(145deg,#0b0b0b,#111,#000);
border-radius:16px;
overflow:hidden;
box-shadow:0 20px 60px rgba(212,175,55,0.25);
border:2px solid #d4af37;
color:white;
}

/* header */
.id-header{
background:linear-gradient(90deg,#000,#111,#000);
color:#d4af37;
text-align:center;
padding:15px;
border-bottom:1px solid #d4af37;
}

/* avatar */
.id-body img{
border-radius:50%;
border:3px solid #d4af37;
width:110px;
height:110px;
object-fit:cover;
}

/* name */
#guideName{
color:#facc15;
font-weight:700;
}

/* badge */
.id-tag{
background:linear-gradient(45deg,#d4af37,#facc15);
color:black;
font-weight:bold;
}

/* footer */
.id-footer{
padding:10px;
font-size:12px;
text-align:center;
border-top:1px solid #d4af37;
color:#ddd;
}

/* glow effect */
.id-card::before{
content:"";
position:absolute;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:linear-gradient(120deg,transparent,rgba(212,175,55,0.1),transparent);
transform:rotate(25deg);
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

.id-header{
background:#1c3faa;
color:white;
text-align:center;
padding:15px;
}

.id-header img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #d4af37; /* golden border optional */
}

.id-body{
text-align:center;
padding:15px;
}

.id-body img{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #0f7b43;
object-fit:cover;
margin-bottom:8px;
}

.id-tag{
background:#0f7b43;
color:white;
display:inline-block;
padding:5px 15px;
border-radius:6px;
font-size:13px;
margin:5px 0;
}

.id-footer{
padding:10px;
font-size:12px;
text-align:center;
border-top:1px solid #eee;
}

.logout-btn{
margin:15px;
width:90%;
padding:10px;
background:red;
color:white;
border:none;
border-radius:8px;
}

.download-btn{
margin:0 15px 10px 15px;
width:90%;
padding:10px;
background:#1c3faa;
color:white;
border:none;
border-radius:8px;
}

/* RIGHT SIDE */
.right-section{
flex:1;
min-width:300px;
}

/* BOX */
.box{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
margin-bottom:15px;
}

.progress-item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

.update-btn{
margin-top:10px;
width:100%;
padding:10px;
background:#1c3faa;
color:white;
border:none;
border-radius:8px;
}

.success{
color:green;
text-align:center;
margin-top:8px;
}

.call-btn{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

.id-header img{
display:block;
margin:auto;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:12px;
}

.founder{
display:flex;
align-items:center;
justify-content:space-between;
margin:10px 0;
padding:8px;
border-bottom:1px solid #eee;
}

.founder img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

.founder button{
background:#28a745;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}

.blue-tick{
width:16px;
height:16px;
flex-shrink:0;
display:inline-block;
}

.premium{
background:linear-gradient(45deg,#FFD700,#FFC107);
color:black;
font-weight:bold;
}
.premium-card{
background:linear-gradient(45deg,#FFD700,#FFC107);
color:black;
font-weight:bold;
border-radius:10px;
padding:6px 12px;
}

#guideName{
text-align:center;
}

#nameRow{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

#guideType{
display:block;
margin-top:4px;
font-size:13px;
color:#d4af37;
font-weight:600;
}

</style>
</head>

<body onload="initGuidePage()">

<!-- HEADER -->
<div class="top-header">
<img src="logo.jpg">
<h3>Aaoza Travels Kashmir</h3>
</div>

<div class="container">

<!-- LEFT -->
<div class="id-card" id="idCard">

<div class="id-header">
<img src="logoidty.jpg">
<h3>Aaoza Travels Kashmir</h3>
</div>

<div class="id-body">
<img id="guidePhoto" src="user.png" crossorigin="anonymous">

<h3 id="guideName">

    <span id="nameRow">
        <span id="guideNameText"></span>
        <svg id="guideTick" class="blue-tick" viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34z" fill="#1DA1F2"/>
            <path d="M9.5 14.58l-2.79-2.79-1.21 1.21 4 4 8-8-1.21-1.21z" fill="#ffffff"/>
        </svg>
    </span>

    <div id="guideType" class="role"></div>

</h3>

<div id="guideBadge" class="id-tag">Guide Identity Card</div>

<p id="guidePhone"></p>
<p id="guideEmail"></p>
</div>

<div class="id-footer">
<b>Aaoza Travels Kashmir</b><br>
Trusted Kashmir Tour Partner<br>
Founders: Aamir • Amir • Owais
</div>
</div>
<!-- BUTTONS OUTSIDE -->
<button class="download-btn" onclick="downloadID()">Download Identity Card</button>
<button class="logout-btn" onclick="logoutGuide()">Logout</button>



<!-- RIGHT -->
<div class="right-section">

<!-- TRIP CONTROL -->
<div class="box">
<h3>Trip Control</h3>
<div id="progressControl"></div>
<button class="update-btn" onclick="saveProgress()">Update Progress</button>
<div id="msg" class="success"></div>
</div>

<!-- PREVIEW -->
<div class="box">
<h3>Preview</h3>
<div id="previewBox"></div>
</div>

<!-- CALL FOUNDERS -->
<div class="box">
<h3>Guide Call Founders</h3>
<button class="call-btn" onclick="openCallModal()">📞 Call Admin</button>
</div>

<div id="callModal" class="modal">
<div class="modal-box">

<h3>Call Founders</h3>

<div class="founder">
<img src="aamir.jpg">
<div>
<b>Founder</b>
<p>+91 7051932522</p>
</div>
<button onclick="callNumber('+917051932522')">Call</button>
</div>

<div class="founder">
<img src="amir.jpg">
<div>
<b>Co-Founder</b>
<p>+91 8899737138</p>
</div>
<button onclick="callNumber('+918899737138')">Call</button>
</div>

<div class="founder">
<img src="owais.jpg">
<div>
<b>Co-Founder</b>
<p>+91 7051654368</p>
</div>
<button onclick="callNumber('+917051654368')">Call</button>
</div>

<button class="update-btn" onclick="closeCallModal()">Close</button>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

let currentBookingId = null
let tempProgress = {}

function initGuidePage(){
loadGuide()
loadGuideProgress()
}

async function loadGuide(){

const guide = JSON.parse(localStorage.getItem("guide"))
if(!guide){ window.location.href="account.html"; return }

// get latest data
const { data } = await supabaseClient
.from("guides")
.select("*")
.eq("email", guide.email)
.single()

if(!data) return

// basic info
guideNameText.innerText = data.name
guidePhone.innerText = "Phone: " + data.phone
guideEmail.innerText = "Email: " + data.email

// TYPE SHOW (NEW)
document.getElementById("guideType").innerText = data.type || "Local Guide"

// image
const img = data.photo || data.photo_url || data.image || data.avatar
if(img){ guidePhoto.src = img }

// =======================
// BADGE + TICK LOGIC
// =======================
const likes = data.likes || 0

// reset
guideTick.style.display = "none"
guideBadge.classList.remove("premium-card", "premium")
guideBadge.innerText = "Guide Identity Card"

// 100+ likes → Premium
if(likes >= 100){
    guideBadge.innerText = "Premium Guide"
    guideBadge.classList.add("premium-card")
    guideTick.style.display = "inline"
}

// 50–99 likes → Verified
else if(likes >= 50){
    guideBadge.innerText = "Verified Guide"
    guideBadge.classList.add("premium")
    guideTick.style.display = "inline"
}

}

async function loadGuideProgress(){

const guide = JSON.parse(localStorage.getItem("guide"))
if(!guide) return

const { data } = await supabaseClient
.from("bookings")
.select("*")
.order("created_at",{ascending:false})

if(!data || data.length===0){
progressControl.innerHTML="No booking"
return
}

let booking = null

data.forEach(b=>{

let admin = b.admin_details || {}

if(typeof admin==="string"){
try{ admin = JSON.parse(admin) }catch(e){}
}

let assigned =
admin.guide ||
admin.guide_email ||
admin.guideEmail ||
admin.selectedGuide

if(assigned === guide.email && !booking){
booking = b
}

})

if(!booking){
progressControl.innerHTML="No trip assigned"
return
}

currentBookingId = booking.id

let parsed={}
try{ parsed = JSON.parse(booking.traveller_details || "{}") }catch(e){}

let places = parsed.places || []
let activities = parsed.activities || []
let gondola = parsed.gondola || []

let saved = booking.progress || {}
if(typeof saved==="string"){
try{ saved = JSON.parse(saved) }catch(e){ saved={} }
}

tempProgress = saved

let admin = booking.admin_details || {}
if(typeof admin==="string"){
try{ admin = JSON.parse(admin) }catch(e){}
}

let html=""

// CAB CONTROL
if(admin.cab_name){

let key="cab"

html+=`
<div class="progress-item">
<span>Cab - ${admin.cab_name}</span>
<input type="checkbox"
${tempProgress[key]?"checked":""}
onchange="tempProgress['${key}']=this.checked;updatePreview()">
</div>`
}

// GUIDE CONTROL
if(admin.guide){

let key="guide"

html+=`
<div class="progress-item">
<span>Guide - ${admin.guide}</span>
<input type="checkbox"
${tempProgress[key]?"checked":""}
onchange="tempProgress['${key}']=this.checked;updatePreview()">
</div>`
}

// HOTEL DAY WISE
for(let i=1;i<=5;i++){

if(admin[`hotel${i}`]){

let key="hotelDay_"+i

html+=`
<div class="progress-item">
<span>Day ${i} - ${admin[`hotel${i}`]}</span>
<input type="checkbox"
${tempProgress[key]?"checked":""}
onchange="tempProgress['${key}']=this.checked;updatePreview()">
</div>`

}

}

places.forEach((p,i)=>{
let key="place_"+i
html+=`
<div class="progress-item">
<span>${p.name}</span>
<input type="checkbox"
${tempProgress[key]?"checked":""}
onchange="tempProgress['${key}']=this.checked;updatePreview()">
</div>`
})

activities.forEach((a,i)=>{
let key="activity_"+i
html+=`
<div class="progress-item">
<span>${a.name}</span>
<input type="checkbox"
${tempProgress[key]?"checked":""}
onchange="tempProgress['${key}']=this.checked;updatePreview()">
</div>`
})

gondola.forEach((g,i)=>{
let key="gondola_"+i
html+=`
<div class="progress-item">
<span>${g}</span>
<input type="checkbox"
${tempProgress[key]?"checked":""}
onchange="tempProgress['${key}']=this.checked;updatePreview()">
</div>`
})

progressControl.innerHTML = html
updatePreview()

}

function updatePreview(){

let html=""
Object.keys(tempProgress).forEach(k=>{
html+=`
<div class="progress-item">
<span>${k}</span>
<span>${tempProgress[k]?"✔":"✖"}</span>
</div>`
})

previewBox.innerHTML = html

}

async function saveProgress(){

const { data } = await supabaseClient
.from("bookings")
.select("progress")
.eq("id", currentBookingId)
.single()

let progress = data?.progress || {}

if(typeof progress==="string"){
try{ progress = JSON.parse(progress) }catch(e){ progress={} }
}

progress = {...progress, ...tempProgress}

await supabaseClient
.from("bookings")
.update({progress:progress})
.eq("id", currentBookingId)

msg.innerText="Progress Updated"

setTimeout(()=>{
msg.innerText=""
location.reload()
},1000)

}  // <-- YE MISSING THA

function logoutGuide(){
localStorage.removeItem("guide")
window.location.href="account.html"
}

function openCallModal(){
document.getElementById("callModal").style.display="flex"
}

function closeCallModal(){
document.getElementById("callModal").style.display="none"
}

function callNumber(num){
window.location.href = "tel:" + num
}
function downloadID(){

const card = document.getElementById("idCard")

html2canvas(card,{
useCORS:true,
allowTaint:true,
scale:2
}).then(canvas=>{

const link = document.createElement("a")
link.download = "Guide-ID-Card.png"
link.href = canvas.toDataURL("image/png")
link.click()

})

}

</script>

</body>
</html>
