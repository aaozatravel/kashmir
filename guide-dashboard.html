<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide Dashboard</title>

<link rel="stylesheet" href="guide.css">
</head>

<body>

<div class="top-bar">
  <h2>Guide Dashboard</h2>
  <button class="guide-logout-btn" onclick="logoutGuide()">Logout</button>
</div>

<div id="bookingBox"></div>

<!-- UPDATE SECTION -->
<div class="box">
<h3>Update Trip</h3>

<textarea id="note" placeholder="Write update..."></textarea>

<select id="status">
<option value="">Select Status</option>
<option>Trip Started</option>
<option>Day 1 Completed</option>
<option>Day 2 Completed</option>
<option>Trip Completed</option>
</select>

<button onclick="saveUpdate()">Save Update</button>

<p id="msg"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="guide.js"></script>

</body>
</html>
