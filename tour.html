<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashmir Tours</title>

<link rel="stylesheet" href="tour.css">
</head>

<body>

<h1 class="title">Explore Kashmir Packages</h1>

<div class="tour-container">

<!-- 🔹 LOCAL -->
<div class="tour-card local">
  
  <div class="img-box">
    <img src="gulmarg.jpg">
    <span class="badge">Local</span>
  </div>

  <div class="content">
    <h2>Local</h2>
    <p>Perfect for budget travellers</p>

    <div class="price">₹29,999</div>

    <div class="actions">
      <span onclick="like(this)">🤍</span>
      <span onclick="share()">🔗</span>
    </div>

    <button onclick="goPackage('local')">View Details</button>
  </div>

</div>

<!-- 🔹 PRO -->
<div class="tour-card pro">

  <div class="img-box">
    <img src="sonmarg.jpg">
    <span class="badge">Pro</span>
  </div>

  <div class="content">
    <h2>Pro</h2>
    <p>More places + activities</p>

    <div class="price">₹39,999</div>

    <div class="actions">
      <span onclick="like(this)">🤍</span>
      <span onclick="share()">🔗</span>
    </div>

    <button onclick="goPackage('pro')">View Details</button>
  </div>

</div>

<!-- 🔹 PREMIUM -->
<div class="tour-card premium">

  <div class="img-box">
    <img src="snow.jpg">
    <span class="badge">Premium+</span>
  </div>

  <div class="content">
    <h2>Premium</h2>
    <p>Luxury + adventure experience</p>

    <div class="price">₹59,999</div>

    <div class="actions">
      <span onclick="like(this)">🤍</span>
      <span onclick="share()">🔗</span>
    </div>

    <button onclick="goPackage('premium')">View Details</button>
  </div>

</div>

</div>

<script>

// ❤️ LIKE TOGGLE
function like(el){
  if(el.innerText === "🤍"){
    el.innerText = "❤️"
  }else{
    el.innerText = "🤍"
  }
}

// 🔗 SHARE
function share(){
  navigator.share?.({
    title:"Kashmir Tour Packages",
    text:"Check out these amazing Kashmir tours!",
    url:window.location.href
  })
}

// 🔥 ROUTING
function goPackage(type){

  // 🔥 SAVE PACKAGE NAME FIRST
  if(type === "local"){
    localStorage.setItem("selectedPackage","Local")
    window.location.href = "package-localtour.html"
  }

  else if(type === "pro"){
    localStorage.setItem("selectedPackage","Pro")
    window.location.href = "package-pro.html"
  }

  else if(type === "premium"){
    localStorage.setItem("selectedPackage","Premium")
    window.location.href = "package-premium.html"
  }

}

</script>
<script src="back.js"></script>

</body>
</html>
