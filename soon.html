<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HotBox - Coming Soon</title>

<style>

/* ================= BODY ================= */
body{
  margin:0;
  padding:0;
  background:#ffffff;
  font-family:sans-serif;
  overflow:hidden;
}

/* ================= FULL IMAGE BG ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:0;
}

.bg img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

/* ================= OVERLAY CONTENT ================= */
.content{
  position:absolute;
  inset:0;
  z-index:2;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-align:center;
  color:#fff;
}

/* LOGO */
.logo{
  width:90px;
  height:90px;
  border-radius:50%;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* TITLE */
.title{
  font-size:38px;
  font-weight:800;
  letter-spacing:1px;
}

/* SUB TEXT */
.subtitle{
  font-size:16px;
  margin-top:8px;
  opacity:0.9;
}

/* ================= VIDEO ================= */
.video-box{
  margin-top:20px;

  width:220px;
  height:140px;

  border-radius:14px;
  overflow:hidden;

  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.video-box video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= ANIMATION ================= */
@keyframes pulse{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
  100%{ transform:scale(1); }
}

.video-box{
  animation:pulse 3s infinite;
}

/* ================= BADGE ================= */
.badge{
  position:absolute;
  top:20px;
  right:20px;

  background:#ff3d00;
  color:#fff;

  padding:6px 12px;
  border-radius:20px;

  font-size:12px;
  font-weight:600;
}

</style>

</head>

<body>

<!-- 🔥 BACKGROUND IMAGE -->
<div class="bg">
  <!-- 👇 YAHAN apni full image dalna -->
  <img src="hotbox-bg.jpg">
</div>

<!-- 🔥 CONTENT -->
<div class="content">

  <!-- LOGO -->
  <img src="hotbox.jpg" class="logo">

  <!-- TITLE -->
  <div class="title">HOTBOX 🔥</div>

  <!-- TEXT -->
  <div class="subtitle">Cooking Something Delicious... 🍔</div>

  <!-- VIDEO -->
  <div class="video-box">
    <!-- 👇 YAHAN apna video dalna -->
    <video autoplay muted loop playsinline>
      <source src="hotbox.mp4" type="video/mp4">
    </video>
  </div>

</div>

<!-- TOP BADGE -->
<div class="badge">Coming Soon</div>

</body>
</html>
