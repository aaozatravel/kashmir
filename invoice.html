<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kashmir Tour Invoice | Aaoza Travels</title>

<!-- SEO -->
<meta name="description" content="Aaoza Travels Kashmir official invoice. View booking details, hotels, guide, cab, and full tour pricing.">
<meta name="keywords" content="Kashmir tour invoice, travel bill Kashmir, Aaoza Travels invoice">
<meta name="author" content="Aaoza Travels Kashmir">

<!-- Open Graph -->
<meta property="og:title" content="Kashmir Tour Invoice">
<meta property="og:description" content="View your complete Kashmir travel invoice with full details">
<meta property="og:image" content="logo.jpg">

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:10px;
}

/* MAIN BOX */
.invoice{
background:white;
max-width:1000px;
margin:auto;
border-radius:10px;
padding:15px;
}

/* HEADER */
.header{
display:flex;
gap:10px;
align-items:center;
border-bottom:2px solid #eee;
padding-bottom:10px;
flex-wrap:wrap;
}

.logo{
width:60px;
}

.header h2{
margin:0;
font-size:20px;
}

.header p{
margin:2px 0;
font-size:13px;
}

/* BOX */
.box{
margin-top:15px;
padding:12px;
border:1px solid #eee;
border-radius:8px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

/* TOTAL */
.total{
text-align:right;
font-size:18px;
font-weight:bold;
margin-top:15px;
}

/* BUTTON */
.print-btn{
margin-top:15px;
padding:10px;
width:100%;
background:black;
color:white;
border:none;
border-radius:6px;
}

/* MOBILE FIX */
@media(max-width:600px){

.header{
flex-direction:column;
align-items:flex-start;
}

.logo{
width:50px;
}

table{
font-size:11px;
}

.total{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="invoice" id="invoice">

<div class="header">
<img src="logo.jpg" class="logo">
<div>
<h2>Aaoza Travels Kashmir</h2>
<p>📞 +91 7051932522</p>
<p>Trusted Kashmir Tour Partner</p>
</div>
</div>

<div id="content"></div>

<div class="total">
Grand Total: ₹ <span id="grandTotal"></span>
</div>

<button class="print-btn" onclick="window.print()">🖨 Print Invoice</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

const urlParams = new URLSearchParams(window.location.search)
const bookingId = urlParams.get("id")

loadInvoice()

async function loadInvoice(){

const { data } = await supabaseClient
.from("bookings")
.select("*")
.eq("id", bookingId)
.single()

if(!data){
document.getElementById("content").innerHTML = "No Invoice Found"
return
}

let parsed = JSON.parse(data.traveller_details || "{}")
let admin = data.admin_details || {}

if(typeof admin === "string"){
try{ admin = JSON.parse(admin) }catch(e){}
}

let travellers = parsed.travellers || []
let places = parsed.places || []
let activities = parsed.activities || []

let gondolaPrice = Number(parsed.gondola_price || 0)

let placesTotal = places.reduce((t,p)=>t+Number(p.price||0),0)
let activitiesTotal = activities.reduce((t,a)=>t+Number(a.price||0),0) + gondolaPrice

let departurePrice = Number(parsed.departure_price || 0)
let subtotal = placesTotal + activitiesTotal + departurePrice

let travellerCount = travellers.length

let singleRoom = Number(parsed.single_room || 0)
let doubleRoom = Number(parsed.double_room || 0)

let roomTotal = (singleRoom*6999)+(doubleRoom*8999)

let grandTotal = (subtotal * travellerCount) + roomTotal

document.getElementById("grandTotal").innerText = grandTotal

let html = ""

/* TRAVELLERS */
html += `
<div class="box">
<h3>Travellers</h3>
<table>
<tr>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
</tr>
${travellers.map(t=>`
<tr>
<td>${t.name}</td>
<td>${t.age}</td>
<td>${t.gender}</td>
<td>${t.phone}</td>
</tr>`).join("")}
</table>
</div>
`

/* PLACES */
html += `
<div class="box">
<h3>Places</h3>
${places.map(p=>`${p.name} - ₹${p.price}`).join("<br>")}
<br><b>Total ₹${placesTotal}</b>
</div>
`

/* ACTIVITIES */
html += `
<div class="box">
<h3>Activities</h3>
${activities.map(a=>`${a.name} - ₹${a.price}`).join("<br>")}
${gondolaPrice ? `<br>Gondola - ₹${gondolaPrice}` : ""}
<br><b>Total ₹${activitiesTotal}</b>
</div>
`

/* ROOMS */
html += `
<div class="box">
<h3>Rooms</h3>
Single (${singleRoom}) = ₹${singleRoom*6999}<br>
Double (${doubleRoom}) = ₹${doubleRoom*8999}<br>
<b>Total ₹${roomTotal}</b>
</div>
`

/* CAB */
html += `
<div class="box">
<h3>Cab & Driver</h3>
Cab: ${admin.cab_name || "-"}<br>
Driver: ${admin.driver_name || "-"}<br>
Phone: ${admin.driver_phone || "-"}
</div>
`

/* GUIDE */
html += `
<div class="box">
<h3>Guide</h3>
${admin.guide || "-"}
</div>
`

/* HOTELS */
html += `
<div class="box">
<h3>Hotels</h3>
${[1,2,3,4,5].map(i=>`
Day ${i}: ${admin["hotel"+i] || "-"}<br>
`).join("")}
</div>
`

/* SERVICES */
html += `
<div class="box">
<h3>Included Services</h3>
✔ Photography<br>
✔ Video Shoot<br>
✔ Trip Assistance
</div>
`

document.getElementById("content").innerHTML = html

}

</script>

</body>
</html>
